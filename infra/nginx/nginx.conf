events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # 1. Redirect HTTP to HTTPS globally
    server {
        listen 80;
        server_name equuscronos.com www.equuscronos.com app.equuscronos.com live.equuscronos.com api.equuscronos.com;

        # Let's Encrypt / Certbot verification path
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. Web Informativa (Static Site)
    server {
        listen 443 ssl;
        server_name equuscronos.com www.equuscronos.com;

        ssl_certificate /etc/letsencrypt/live/equuscronos.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/equuscronos.com/privkey.pem;

        location / {
            proxy_pass http://web-informativa:80;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded-for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 3. Web de Administración Next.js
    server {
        listen 443 ssl;
        server_name app.equuscronos.com;

        ssl_certificate /etc/letsencrypt/live/equuscronos.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/equuscronos.com/privkey.pem;

        location / {
            proxy_pass http://admin-web:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded-for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 4. Web Pública Next.js
    server {
        listen 443 ssl;
        server_name live.equuscronos.com;

        ssl_certificate /etc/letsencrypt/live/equuscronos.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/equuscronos.com/privkey.pem;

        location / {
            proxy_pass http://public-web:3002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded-for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 5. API NestJS
    server {
        listen 443 ssl;
        server_name api.equuscronos.com;

        ssl_certificate /etc/letsencrypt/live/equuscronos.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/equuscronos.com/privkey.pem;

        location / {
            proxy_pass http://api:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded-for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
