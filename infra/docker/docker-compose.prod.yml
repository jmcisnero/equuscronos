version: '3.8'

services:
  # 1. Base de Datos Principal: PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: equuscronos-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-equus_secure_pass_2026}
      POSTGRES_DB: ${DB_NAME:-equuscronos}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Inicialización automática de esquema y semillas
      - ../../libs/database/src/migrations/001_init_schema.sql:/docker-entrypoint-initdb.d/001_init_schema.sql:ro
      - ../../libs/database/src/seeds/01_initial_seed.sql:/docker-entrypoint-initdb.d/002_initial_seed.sql:ro
    networks:
      - equus-network

  # 2. Caché y Tiempos en Vivo: Redis
  redis:
    image: redis:7-alpine
    container_name: equuscronos-cache
    restart: always
    networks:
      - equus-network

  # 3. API NestJS
  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    container_name: equuscronos-api
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-equus_secure_pass_2026}
      DB_NAME: ${DB_NAME:-equuscronos}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-equus_jwt_secret_2026_super_secure}
    depends_on:
      - db
      - redis
    networks:
      - equus-network

  # 4. Web de Administración Next.js (app.equuscronos.com)
  admin-web:
    build:
      context: ../../
      dockerfile: apps/admin-web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL_ADMIN:-https://api.equuscronos.com/admin}
    container_name: equuscronos-admin-web
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL_ADMIN:-https://api.equuscronos.com/admin}
      PORT: 3001
    depends_on:
      - api
    networks:
      - equus-network

  # 5. Web Pública Next.js (live.equuscronos.com)
  public-web:
    build:
      context: ../../
      dockerfile: apps/public-web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL_LIVE:-https://api.equuscronos.com}
    container_name: equuscronos-public-web
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL_LIVE:-https://api.equuscronos.com}
      PORT: 3002
    depends_on:
      - api
    networks:
      - equus-network

  # 6. Web Informativa Estática (www.equuscronos.com / equuscronos.com)
  web-informativa:
    build:
      context: ../../
      dockerfile: apps/web-informativa/Dockerfile
    container_name: equuscronos-web-informativa
    restart: always
    expose:
      - "80"
    networks:
      - equus-network

  # 7. Reverse Proxy: Caddy (Default, handles automatic SSL/HTTPS renewal)
  caddy:
    image: caddy:2-alpine
    container_name: equuscronos-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - admin-web
      - public-web
      - web-informativa
    networks:
      - equus-network

  # ALTERNATIVA - Reverse Proxy: Nginx (To use Nginx, uncomment below and comment Caddy)
  # nginx:
  #   image: nginx:alpine
  #   container_name: equuscronos-nginx
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   depends_on:
  #     - api
  #     - admin-web
  #     - public-web
  #     - web-informativa
  #   networks:
  #     - equus-network

networks:
  equus-network:
    driver: bridge

volumes:
  pgdata:
  caddy_data:
  caddy_config:
